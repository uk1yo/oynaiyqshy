<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метрология Викторина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-light">

<div class="container py-4">
    <br>

    <div class="row text-center mb-4" id="scoreboard">
        <div class="col"><div class="team-card p-3 rounded">Топ 1: <br><span class="fs-3 fw-bold" id="t1">0</span></div></div>
        <div class="col"><div class="team-card p-3 rounded">Топ 2: <br><span class="fs-3 fw-bold" id="t2">0</span></div></div>
        <div class="col"><div class="team-card p-3 rounded">Топ 3: <br><span class="fs-3 fw-bold" id="t3">0</span></div></div>
        <div class="col"><div class="team-card p-3 rounded">Топ 4: <br><span class="fs-3 fw-bold" id="t4">0</span></div></div>
    </div>

    <div class="game-board" id="grid"></div>
</div>

<div class="modal fade" id="questionModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content custom-modal text-white">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title w-100 text-center fs-3 c1" id="pointsTitle">Cұрақ</h5>
            </div>
            <div class="modal-body text-center py-4">
                <h3 id="questionArea" class="mb-4"></h3>
                <div id="answerArea" class="alert alert-success fs-5 d-none" role="alert"></div>
                
                <div id="buttonsArea" class="mt-4">
                    <button class="btn btn-lg w-50 b1" id="showAnswerBtn" onclick="showAnswer()">Жауапты көру</button>
                    <div id="teamButtons" class="d-none mt-3 flex-wrap justify-content-center gap-2">
                        </div>
                </div>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-outline-light" onclick="closeWithoutPoints()">Жауап берілмеді (Жабу)</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
